services:
  libraforge:
    build: .
    container_name: libraforge
    # Defaults to 1000:1000 so a bare `docker compose up` works. `make up` exports the
    # current host UID/GID so bind-mounted dirs stay writable on non-1000 hosts.
    user: "${UID:-1000}:${GID:-1000}"
    restart: unless-stopped
    ports:
      - "127.0.0.1:5056:5056"
    environment:
      - SCRIPTS_DIR=/app/scripts
      - REPORTS_DIR=/app/reports
      - AUDIOBOOKS_ROOT=/audiobooks
    volumes:
      # UI/backend app code bind-mounted for faster iteration during development.
      - ./app:/app/app
      # Maintained fixer and organizer scripts exposed by the UI.
      - ./scripts:/app/scripts
      # Shared title-noise defaults and local UI-managed overrides.
      - ./config:/app/config
      # Completed log/report files are written here and exposed for download.
      - ./reports:/app/reports
      # Your audiobook library. Defaults to a repo-local folder so first boot works
      # with zero config; point AUDIOBOOKS_PATH at your real library in .env.
      - ${AUDIOBOOKS_PATH:-./data/audiobooks}:/audiobooks
      # Audible auth files. Read-write so the app can add/switch/disconnect accounts
      # (login + deregister write here). Recommended: a dedicated dir, not your main
      # audible-cli config. Future hardening: gate the web app behind Linux users.
      - ${AUDIBLE_AUTH_PATH:-./data/auth}:/auth
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5056/health', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
