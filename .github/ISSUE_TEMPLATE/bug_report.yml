name: Bug report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before reporting, check that you are on the latest `main` and that the container
        logs (`make logs`) do not show an obvious startup error.

        For matching/scoring/organizer bugs, see
        [docs/reporting-issues.md](https://github.com/coconautilus17/LibraForge/blob/main/docs/reporting-issues.md)
        for how to enable debug trace and attach the JSON report - it's the fastest way
        to get a fix.

        **Please redact any real paths, Audible user IDs, or auth file contents before
        submitting.**

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug. What did you do, what did you expect, what actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: Paste redacted output from `make logs` or the browser console.
      render: text

  - type: input
    id: version
    attributes:
      label: Commit / branch
      placeholder: e.g. main @ abc1234
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Host OS
      placeholder: e.g. Ubuntu 24.04, macOS 15
