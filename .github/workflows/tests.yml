name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SCRIPTS_DIR: ${{ github.workspace }}/scripts
      REPORTS_DIR: /tmp/libraforge-reports
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s app/tests -t . -p "test_*.py"
      - run: |
          python -m py_compile \
            app/main.py \
            app/manual_review.py \
            app/m4b_naming.py \
            app/conversion_cache.py \
            app/conversion_discovery.py \
            app/progress_phases.py \
            app/title_noise_policy.py
          find scripts -name "*.py" -exec python -m py_compile {} +
