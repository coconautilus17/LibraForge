name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SCRIPTS_DIR: ${{ github.workspace }}/scripts
      REPORTS_DIR: /tmp/libraforge-reports
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install -r requirements.txt
      - run: python -m unittest discover -s app/tests -t . -p "test_*.py"
      - run: |
          python -m py_compile \
            app/main.py \
            app/manual_review.py \
            app/m4b_naming.py \
            app/conversion_cache.py \
            app/conversion_discovery.py \
            app/progress_phases.py \
            app/title_noise_policy.py
          find scripts -name "*.py" -exec python -m py_compile {} +

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose config
        run: docker compose config --quiet
      - name: Build image
        run: docker build -t libraforge:ci .
      - name: Smoke import
        run: docker run --rm -e SCRIPTS_DIR=/app/scripts -e REPORTS_DIR=/tmp/reports libraforge:ci python -c "import app.main; print('ok')"
